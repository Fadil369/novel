  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">The skeleton as<br><em>architecture.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>BoneForge</strong> is the cinematic medical novelist engine for orthopedics — a tool that transforms the clinical language of fracture classifications, bone healing stages, and joint biomechanics into prose that reads like an architectural novel in which the structure of the body is both the building and the story of everyone who has ever lived inside it.</p>
    <p>Bone is the only tissue in the body that heals without scarring. When a fracture heals correctly, the repaired cortex is structurally identical to the original — the injury is erased. But bone also records the history of every stress it has endured: the callus of an old fracture, the remodeling of a stress response, the density loss of years of disuse. The skeleton is a palimpsest — a document written over and over, with the earlier versions always visible to the trained eye.</p>
    <p><strong>BoneForge does not describe orthopedic surgery.</strong> It narrates the biography of the musculoskeletal system — from the first ossification center in fetal development to the fragility fracture of old age — as an architectural epic told by the structure that holds everything else up.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>BoneForge هو محرك الروائي الطبي السينمائي لجراحة العظام — يحوّل لغة تصنيفات الكسور ومراحل التئام العظام وبيوميكانيكا المفاصل إلى نثر يُقرأ كرواية معمارية يكون فيها هيكل الجسم هو المبنى والقصة في آن واحد.</p>
    <p>BoneForge لا يصف جراحة العظام. بل يروي سيرة الجهاز العضلي الهيكلي — من مركز التعظم الأول في التطور الجنيني إلى كسر هشاشة العظام في الشيخوخة.</p>
  </div></div>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The fracture<br><em>as text.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · Bone Healing as Resurrection</div>
    <div class="lens-fact">RAW FACT: Bone fracture healing occurs in 4 stages: hematoma formation (days 1-5), soft callus (weeks 1-3), hard callus (weeks 3-12), and remodeling (months to years). The remodeled bone is structurally equivalent to uninjured cortex.</div>
    <div class="lens-en">
      The fracture happens in an instant. The healing takes months. And in the space between that instant and those months, something extraordinary occurs that medicine has almost normalized to the point of not seeing: <strong>dead tissue becomes living tissue. A structural failure becomes structural integrity. The break becomes, eventually, exactly what it was before it broke.</strong><br><br>
      Stage one: hematoma. The bleeding organizes itself into a clot — the first crude scaffold of the repair. Inflammatory cells arrive. They are not the enemy. They are the demolition crew, clearing the damaged bone matrix for the rebuilding that comes after. Osteoclasts resorb. Osteoblasts arrive. The soft callus forms — cartilaginous, flexible, not yet bone but committed to becoming it.<br><br>
      By week twelve, the hard callus has mineralized. By month twelve, the remodeling has erased the seam of the injury. The Haversian canals have reorganized along the lines of mechanical stress. The forensic radiologist, looking at this femur a decade hence, will be unable to find the fracture. The bone remembered itself. Exactly.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">الكسر يحدث في لحظة. التئامه يستغرق أشهراً. وفي الفضاء بين تلك اللحظة وتلك الأشهر، يحدث شيء استثنائي: النسيج الميت يصبح نسيجاً حياً. الفشل الهيكلي يصبح سلامة هيكلية. الكسر يصبح، في نهاية المطاف، بالضبط ما كان عليه قبل أن ينكسر. العظم تذكّر نفسه. بدقة تامة.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · The Hip Fracture as Catastrophe</div>
    <div class="lens-fact">RAW FACT: Mortality from hip fracture in the elderly is 20–30% at one year. The fracture itself is rarely fatal — it is the cascade of immobility, aspiration pneumonia, deep vein thrombosis, and loss of independence that follows. The fall is a sentence.</div>
    <div class="lens-en">
      The fall takes 0.3 seconds. The fracture happens in the last 0.05 of those seconds, at the moment of impact, at the point of maximum force concentration — the subcapital region of the femoral neck, where the cortex is thinnest and the trabecular architecture most vulnerable. <strong>The sound, if anyone is listening, is almost nothing. A click. Then the floor.</strong><br><br>
      The hip fracture in an 82-year-old is not a simple orthopedic problem. It is the beginning of a cascade. Immobility leads to muscle atrophy — 1-3% per day in the elderly. Pressure leads to skin breakdown. Bed rest leads to venous stasis. Pain leads to shallow breathing. Shallow breathing leads, in 20% of cases within the year, to aspiration pneumonia. Aspiration pneumonia leads to the ICU. The ICU, in this age group, with this frailty index, leads to the outcome no one writes in the notes but everyone is calculating.<br><br>
      <em>The fall was a sentence. The hip fracture was the punctuation.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">السقطة تستغرق 0.3 ثانية. الكسر يحدث في آخر 0.05 منها، لحظة التأثير. كسر الورك في مريض يبلغ 82 عاماً ليس مشكلة عظمية بسيطة. إنه بداية تسلسل. الشلل يؤدي إلى ضمور العضلات. السرير يؤدي إلى ركود وريدي. الألم يؤدي إلى التنفس السطحي. التنفس السطحي يؤدي، في 20% من الحالات خلال العام، إلى الالتهاب الرئوي الاستنشاقي. السقطة كانت جملة. كسر الورك كان علامة الترقيم.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · Compartment Syndrome as the Body Becoming Its Own Enemy</div>
    <div class="lens-fact">RAW FACT: Compartment syndrome occurs when pressure within a fascial compartment exceeds perfusion pressure, causing ischemia. The diagnostic threshold is compartment pressure within 30 mmHg of diastolic BP. Fasciotomy within 6 hours prevents permanent damage. After 8 hours, muscle necrosis is irreversible.</div>
    <div class="lens-en">
      After the forearm fracture, everything looked fine. The bone was set. The cast was applied. The X-ray showed acceptable alignment. <strong>And then, over the next six hours, the swelling inside the cast was building to a pressure that would destroy the very muscles the cast was meant to protect.</strong><br><br>
      Compartment syndrome is the body's architecture turning against itself. The swelling that is a normal response to injury — the edema of inflammation — is contained within a rigid fascial envelope that cannot expand. Pressure builds. Perfusion pressure falls. The capillary beds collapse. The muscles begin to die — not from the original injury, but from ischemia caused by their own inflammatory response, trapped by their own connective tissue scaffolding.<br><br>
      The window is 6 hours from symptom onset to fasciotomy. After 8 hours, the damage is permanent. The muscles do not recover from ischemia at that duration. They fibrose. They contract. The hand that was injured will, without decompression, become a hand that cannot open. <em>The question is not whether to operate. The question is whether the clock has already run out.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">بعد كسر الساعد، بدا كل شيء على ما يرام. العظم تم تثبيته. الجبيرة طُبّقت. لكن على مدى الساعات الست التالية، كان الانتفاخ داخل الجبيرة يبني ضغطاً سيدمر العضلات التي قصدت الجبيرة حمايتها. متلازمة القسيم بنية الجسم تتحول ضد نفسها. النافذة الزمنية: ست ساعات من بداية الأعراض للبزل. بعد ثماني ساعات، الضرر دائم. السؤال ليس ما إذا كان يجب إجراء العملية. السؤال هو: هل انتهى الوقت بالفعل؟</div>
  </div>
</section>

      <div class="act-scene">"She got up to use the bathroom at 3 AM the way she had done every night for thirty years. She didn't turn on the light. She didn't think to hold the wall. And somewhere between the bed and the door, the femoral neck — compromised by twenty years of osteoporosis she had never been tested for — gave way. She lay on the floor until 7 AM, when her daughter called."</div>
      <div class="act-clinical">78-year-old female · Found on floor after fall<br>Right hip pain, unable to bear weight<br>DEXA T-score: -3.1 (osteoporosis)</div>

      <div class="act-title">The Garden-Spade Fracture</div>
      <div class="act-scene">"The X-ray showed a Garden Type III fracture — subcapital, displaced. The orthopedic surgeon looked at it and made two decisions simultaneously: this goes to surgery tonight, and this patient is never going home the same way she left. The bone was broken. The life was reconfiguring itself around the break."</div>
      <div class="act-clinical">X-ray: Garden Type III subcapital NOF fracture<br>Pre-op bloods: Hb 10.2, eGFR 45, INR 1.1<br>Hemiarthroplasty indicated · Surgery within 36h</div>

    <div class="act-cell">
      <div class="act-num">Act III — The Outcome</div>
      <div class="act-title">The New Architecture</div>
      <div class="act-scene">"The hemiarthroplasty was successful. She was weight-bearing with a frame by day two. Physiotherapy daily. By week six she was walking with a stick in her daughter's garden. By month three she had stopped using the stick indoors. The fracture had changed her — the light was always on now, the floor was clear, the bathroom was closer — but she was walking. She was walking."</div>
      <div class="act-clinical">Hemiarthroplasty: Austin Moore prosthesis<br>WB day 2 · OT home assessment completed<br>Alendronate + calcium/D3 commenced · Falls review</div>

        <div class="novel-p">A forensic anthropologist reads the bones of an ancient skeleton — and the novel unfolds as a biography reconstructed entirely from skeletal evidence. Old fractures, healed stress reactions, the calcified ghost of a childhood illness, the arthritis of old age. A life read in calcium. The skeleton as autobiography.</div>
        <div class="novel-tags"><span class="novel-tag">Forensic Anthropology</span><span class="novel-tag">Biographical Novel</span><span class="novel-tag">Temp 0.65</span><span class="novel-tag">EN+AR</span></div>

        <div class="novel-ar" lang="ar">ست ساعات</div>
        <div class="novel-p">A compartment syndrome told in real time — from the moment of the fracture through the six-hour window in which fasciotomy could have saved the hand, to the moment the window closes. The novel is told by the muscle — the flexor digitorum profundus — narrating its own ischemia, its own death, and the contracture that follows.</div>
        <div class="novel-tags"><span class="novel-tag">Compartment Syndrome</span><span class="novel-tag">First-Person Muscle</span><span class="novel-tag">Temp 0.90</span><span class="novel-tag">EN+AR</span></div>

        <div class="novel-en">The Light I Now Turn On</div>
        <div class="novel-ar" lang="ar">الضوء الذي أشعله الآن</div>
        <div class="novel-p">A hip fracture patient's memoir of recovery — from the 3 AM fall to the day she walks unaided in her garden twelve weeks later. Not a medical narrative but a human one: the humiliation of dependence, the renegotiation of identity, the small daily victories of rehabilitation, and what it means to understand, for the first time, that the body's architecture has its limits — and to decide to protect it anyway.</div>
