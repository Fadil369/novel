<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">Who this app is.<br><em>Why it matters.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>PulseForge</strong> is the world's first cinematic medical novelist engine for cardiology — a tool that transforms the dry clinical language of ECG strips, hemodynamic equations, and pharmacological protocols into prose that reads like Hemingway wrote it in a cardiac catheterization lab at 3 AM.</p>
    <p>It is built for the cardiologist who has explained myocardial infarction to a thousand patients and watched comprehension fail a thousand times. It is built for the medical student who memorizes the Frank-Starling curve but cannot feel why it matters. It is built for the Arabic-speaking physician who deserves to read about the coronary arteries in a language that honors both the science and the soul.</p>
    <p><strong>PulseForge does not simplify medicine.</strong> It dramatizes it. Every cardiac fact remains clinically inviolable. But the way those facts are delivered — the metaphor, the pacing, the cliffhanger at the end of every pathophysiology section — these are the weapons of a novelist working in service of a physician.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>PulseForge هو أول محرك روائي سينمائي طبي في العالم لأمراض القلب — أداة تحوّل اللغة السريرية الجافة لشرائط تخطيط القلب والمعادلات الديناميكية إلى نثر يُقرأ كما لو أن هيمنغواي كتبه في مختبر قسطرة قلبية في الساعة الثالثة صباحاً.</p>
    <p>PulseForge لا يُبسّط الطب. بل يُدرّجه. كل حقيقة قلبية تبقى محمية سريرياً. لكن طريقة تقديم تلك الحقائق — الاستعارة، والإيقاع، والتوقف الدرامي — هذه هي أسلحة الروائي الذي يعمل في خدمة الطبيب.</p>
  </div></div>
</section>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The raw fact.<br><em>The cinematic</em> truth.</h2>
  <p class="sec-body">Three creative lenses, applied to three clinical facts. The science does not change. The experience of receiving it — completely transformed.</p>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Organ Has a Personality</div>
    <div class="lens-fact">RAW FACT: The human heart beats approximately 100,000 times per day, pumping 5 liters of blood per minute at rest, consuming 8–10% of total body oxygen despite being only 0.5% of body weight.</div>
    <div class="lens-en">
      The heart does not rest. Not once. From the moment a four-chambered fist first contracts in the dark water of the womb — seventeen days after conception, before the brain has so much as a thought — it begins its negotiation with time. One hundred thousand contractions per day. <strong>Not a rhythm. An obsession.</strong><br><br>
      While you sleep, the heart is awake. While you grieve, it continues its accounting. While you fall in love, it is already calculating the oxygen debt of the encounter. It is the only organ in the body that cannot afford to be distracted. Every other structure can pause, adapt, wait. The heart cannot wait.<br><br>
      And yet — and here is the terrible beauty of it — with all this dedication, all this relentless percussion, it still manages to surprise you. At the moment you least expect it, in the middle of a Tuesday, it stops being merely reliable. It becomes a story.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">القلب لا يستريح. ولا مرة واحدة. منذ اللحظة التي انقبض فيها لأول مرة — قبضة ذات أربع حجرات في الماء المعتم للرحم — قبل أن يكون للدماغ أي فكرة، بدأ مفاوضاته مع الزمن. مئة ألف انقباض يومياً. ليس إيقاعاً. بل هوساً. بينما أنت نائم، القلب يقظ. بينما تحزن، يواصل محاسباته. وفي نهاية كل هذا الاجتهاد — ماذا لو صدمك فجأة؟ ماذا لو توقف في منتصف يوم ثلاثاء عادي؟</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · The STEMI as Race Against the Clock</div>
    <div class="lens-fact">RAW FACT: In STEMI, a coronary plaque ruptures, triggering platelet aggregation and thrombus formation. Every minute of delayed reperfusion causes approximately 2 million cardiomyocyte deaths. Door-to-balloon target: 90 minutes.</div>
    <div class="lens-en">
      It begins with a rupture. Not dramatic — not a gunshot, not a scream. A quiet geological event: a plaque, built over years like silt behind a dam, develops a fissure no wider than a hair. <strong>The blood sees it immediately.</strong><br><br>
      Platelets arrive first — the body's first responders, activated and aggregating within seconds. Fibrin follows. Thrombin follows. In under three minutes, the coronary artery that once carried oxygen to two million cardiomyocytes is silent. Now the clock starts. Not the clock on the wall — a different clock, measured in muscle. <strong>Every minute: two million cardiomyocytes lost.</strong> Every minute the interventional team is not in that vessel, the infarct grows.<br><br>
      The window is ninety minutes from door to balloon. After that, muscle becomes scar — and scar, unlike muscle, does not remember how to beat.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">يبدأ الأمر بتمزق. ليس دراماتيكياً — ليس طلقة نارية، ليس صرخة. بل حدث جيولوجي هادئ: لويحة تراكمت على مدى سنوات، تنشأ فيها شقيقة لا أوسع من شعرة. الصفائح الدموية تصل أولاً — تتنشط وتتكتل خلال ثوانٍ. في أقل من ثلاث دقائق، الشريان التاجي صامت. في كل دقيقة: مليونا خلية عضلية قلبية مفقودة. بعد التسعين دقيقة، يصبح العضل ندبة. والندبة لا تتذكر كيف تنبض.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Silent First Symptom</div>
    <div class="lens-fact">RAW FACT: In 50% of cases of sudden cardiac death, it is the first clinical manifestation of coronary artery disease. No prior symptoms. No prior diagnosis.</div>
    <div class="lens-en">
      Here is the fact that should haunt every cardiologist at 3 AM: <strong>half of all sudden cardiac deaths happen in people who had no idea they had heart disease.</strong> No prior warning. No prodromal chest pain. No incidental ECG with a suspicious Q wave. Nothing.<br><br>
      The first symptom of coronary artery disease, in one in two patients, is death. The heart spent years building toward this moment — layering plaque, remodeling vessels — all in silence. The patient was running in the park three days ago. They were laughing at dinner last night. This morning, in the middle of a Tuesday, the first chapter and the last chapter arrived simultaneously.<br><br>
      <em>Which means the real question is not how to treat it. The real question is: who, right now, walking toward their car, is already on the last page?</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">إليك الحقيقة التي ينبغي أن تطارد كل طبيب قلب في الثالثة صباحاً: نصف حالات الموت القلبي المفاجئ تحدث لأشخاص لم يكن لديهم أي فكرة بأنهم مصابون بمرض في القلب. العرض الأول لمرض الشريان التاجي، في واحد من كل اثنين، هو الموت. فمن الذي يمشي الآن، في هذه اللحظة، نحو سيارته — وهو بالفعل في الصفحة الأخيرة؟</div>
  </div>
</section>
