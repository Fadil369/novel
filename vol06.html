<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">The ER as<br><em>battlefield.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>TraumaForge</strong> is the cinematic medical novelist engine for emergency medicine — a tool that transforms the clinical language of triage scores, ATLS protocols, shock states, and rapid sequence intubation into prose that reads like a war novel written by a physician who has stood at the intersection of life and death for twelve consecutive hours and has no plans to stop.</p>
    <p>Emergency medicine is the specialty of first contact and last resort — the specialty where decisions are made with incomplete information, under time pressure, with the highest possible stakes. The emergency physician cannot wait for more data. They cannot wait for the specialist to arrive. They must act on what they have, in the time they have, with the resources they have.</p>
    <p><strong>TraumaForge does not describe emergency protocols.</strong> It dramatizes the cognitive and moral experience of making life-or-death decisions in real time — the triage decision that determines who waits, the airway decision that determines who breathes, the code decision that determines who continues.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>TraumaForge هو محرك الروائي الطبي السينمائي لطب الطوارئ — يحوّل اللغة السريرية لدرجات الفرز وبروتوكولات ATLS وحالات الصدمة إلى نثر يُقرأ كرواية حرب كتبها طبيب وقف عند تقاطع الحياة والموت لاثنتي عشرة ساعة متواصلة.</p>
    <p>TraumaForge لا يصف بروتوكولات الطوارئ. بل يُدرّج التجربة المعرفية والأخلاقية لاتخاذ قرارات حياة أو موت في الوقت الفعلي.</p>
  </div></div>
</section>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The ER's<br><em>twelve hours.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · Triage as Moral Philosophy</div>
    <div class="lens-fact">RAW FACT: The START triage system (Simple Triage and Rapid Treatment) classifies patients as Immediate (red), Delayed (yellow), Minimal (green), or Expectant (black) — those unlikely to survive even with treatment. In mass casualty events, resources are allocated away from the most severely injured.</div>
    <div class="lens-en">
      The black tag does not mean this patient will not receive care. <strong>It means this patient will not receive care first.</strong> And in a mass casualty event where there are seven patients with black tags and two physicians and twelve minutes of collective attention, first is the only thing that matters.<br><br>
      The triage physician walks the line between science and philosophy with every tag they place. The red tag says: this person can be saved and must be saved now. The black tag says: this person cannot be saved with the resources available, and saving them would cost the lives of those who can be saved. It is not abandonment. It is arithmetic. It is the calculus of the possible.<br><br>
      No one trains for the moment they look at a human being — a person with a name, with a family somewhere, with a life that existed before this ambulance — and write them off. Not because they are worthless. Because saving them would be too expensive for everyone else. <em>The black tag is the most moral decision in emergency medicine. It is also the one that never goes away.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">العلامة السوداء لا تعني أن هذا المريض لن يتلقى رعاية. تعني أنه لن يتلقاها أولاً. وفي حادثة ضحايا جماعية حيث يوجد سبعة مرضى بعلامات سوداء وطبيبان فقط، "الأول" هو الشيء الوحيد المهم. لا أحد يتدرب على اللحظة التي ينظر فيها إلى إنسان — شخص له اسم، وعائلة في مكان ما — ويشطبه. ليس لأنه عديم القيمة. بل لأن إنقاذه سيكون مكلفاً جداً بالنسبة للجميع. العلامة السوداء هي القرار الأكثر أخلاقية في طب الطوارئ. وهي أيضاً التي لا تختفي أبداً.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · Rapid Sequence Intubation as Combat Operation</div>
    <div class="lens-fact">RAW FACT: Rapid Sequence Intubation (RSI) uses a sedative agent followed immediately by a neuromuscular blocking agent to achieve optimal intubation conditions. It induces complete apnea. The physician has typically 3–5 minutes before dangerous hypoxia.</div>
    <div class="lens-en">
      RSI is the most consequential ninety seconds in emergency medicine. <strong>You give the drugs. You paralyze the patient. You have removed their ability to breathe. Now you must intubate — and you must succeed.</strong><br><br>
      The sequence is scripted: etomidate 0.3 mg/kg IV push. Succinylcholine 1.5 mg/kg. Thirty seconds of onset. The jaw goes slack. The chest stops moving. The room goes quiet in the particular way that rooms go quiet when everyone in them knows that something irreversible has just happened. The patient is apneic. They are now breathing on their schedule — which is: none. Their oxygen saturation begins its inevitable descent.<br><br>
      The laryngoscope goes in. The cords should be there. They are. Tube goes through. CO₂ rises on the capnography. Breath sounds bilaterally. The saturation stops falling. The room breathes again. But for ninety seconds, the most critical ninety seconds of this patient's life, the physician held the sole responsibility for a human airway — and everything that went with it.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">التتابع السريع للتنبيب هو التسعون ثانية الأكثر أهمية في طب الطوارئ. تُعطي الأدوية. تُشلّ المريض. لقد أزلت قدرته على التنفس. والآن يجب أن تُنبّبه — ويجب أن تنجح. الفك يرتخي. الصدر يتوقف عن الحركة. الغرفة تصمت بالطريقة التي تصمت بها الغرف حين يعرف الجميع فيها أن شيئاً لا رجعة فيه قد حدث للتو. المريض واقف عن التنفس. لتسعين ثانية، حمل الطبيب وحده مسؤولية مجرى هواء بشري — وكل ما صاحبه.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Code at 3 AM</div>
    <div class="lens-fact">RAW FACT: Survival rates from out-of-hospital cardiac arrest average 10–12% globally. In-hospital cardiac arrest survival to discharge is approximately 25%. Every minute without CPR decreases survival by 10%. Every minute without defibrillation decreases it by 7–10%.</div>
    <div class="lens-en">
      At 3:12 AM, the monitor flatlines. The code is called. The team assembles with the speed of people who have rehearsed this moment a thousand times and never get used to it.<br><br>
      CPR begins — 100 compressions per minute, 5-6 cm depth, full chest recoil. Someone counts. Someone manages the airway. Someone draws the epinephrine. Someone watches the monitor for a shockable rhythm. The algorithm runs in the physician's mind like a second heartbeat: two minutes of CPR, rhythm check, shock if indicated, resume CPR, epinephrine every 3-5 minutes, treat reversible causes. H's and T's.<br><br>
      <strong>The mathematics are brutal:</strong> every minute without defibrillation decreases survival by 7-10%. They are at minute four. The room knows this. No one says it. The compressions continue. The monitor shows VF — a shockable rhythm. The shock is delivered at 200J. The rhythm converts. A pulse returns. The room breathes.<br><br>
      <em>The global survival rate from out-of-hospital cardiac arrest is 10%. This patient is in that 10%. For now. The 3 AM will not tell you what happens at 3 AM the following morning.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">الساعة 3:12 صباحاً. الشاشة تُسطّح. تُعلن الشيفرة. الفريق يتجمع بسرعة أشخاص مرّنوا هذه اللحظة ألف مرة ولم يعتادوا عليها قط. الرياضيات قاسية: كل دقيقة بلا صعق كهربائي تقلل البقاء بـ7-10%. هم في الدقيقة الرابعة. الغرفة تعرف هذا. لا أحد يقوله. الضغطات تستمر. معدل البقاء العالمي من توقف القلب خارج المستشفى هو 10%. هذا المريض في ذلك الـ10%. في الوقت الحالي.</div>
  </div>
</section>

  <div class="act-grid">
    <div class="act-cell">
      <div class="act-num">Act I — The Arrival</div>
      <div class="act-title">The Ambulance Doors</div>
      <div class="act-scene">"The paramedic said: 'GCS 8, BP 80/50, HR 130, mechanism blunt abdominal trauma, fall from scaffold at 6 meters.' He was still saying it when the trauma team moved. There was no pause between the handover and the action. The ER does not have a moment between receiving information and using it."</div>
      <div class="act-clinical">32-year-old male · Blunt abdominal trauma · 6m fall<br>GCS 8 · BP 80/50 · HR 130 · SpO₂ 91%<br>FAST positive: free fluid periumbilical</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Resuscitation</div>
      <div class="act-title">The Simultaneous Everything</div>
      <div class="act-scene">"Two large-bore IVs placed simultaneously — one in each antecubital. Massive transfusion protocol activated. RSI performed in 4 minutes from arrival. FAST showed free fluid in Morrison's pouch — a lot of it. The surgical team was already scrubbing. The ER physician's job, in this moment, was to keep the patient alive long enough for surgery to happen."</div>
      <div class="act-clinical">MTP 1:1:1 activated · RSI successful<br>FAST: free fluid Morrison's + perisplenic<br>CT abdomen: splenic laceration Grade IV · hemoperitoneum</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act III — The Handover</div>
      <div class="act-title">The Transfer of Care</div>
      <div class="act-scene">"At OR suite 3, the EM physician gave the SBAR to the anesthesiologist in forty-five seconds. Then they stepped back. The surgeons moved in. The ER physician walked back to the department. There were eleven other patients waiting. The handover was complete — the story continued without them, in a room they would never see the inside of again."</div>
      <div class="act-clinical">OR: splenectomy · 3.2L hemoperitoneum evacuated<br>Post-op ICU admission · Stable at 24 hours<br>EM physician back to department: 11 patients waiting</div>

  <div class="ghost-block">
    <div class="ghost-header">👻 CLINICALLINC · Emergency Medicine Accuracy Specifications</div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> ATLS (Advanced Trauma Life Support) primary survey order is ABCDE: Airway, Breathing, Circulation, Disability (neuro), Exposure. This sequence is never altered in trauma prose for dramatic effect.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> RSI drug dosing is weight-based and indication-specific. Succinylcholine is contraindicated in hyperkalemia, burns >24h, crush injuries >5 days, and neuromuscular disease. This is never dramatized as universal.</span></div>

<section class="fade">
  <div class="sec-label">E — The Interface</div>
  <h2 class="sec-title">The Alchemy<br><em>Studio.</em></h2>
  <div class="iface-grid">
    <div class="iface-card"><div class="iface-icon">🚨</div><div class="iface-title">Triage Narrative Generator</div><div class="iface-desc">Input a patient's vital signs and mechanism of injury, and the engine generates both the clinical triage decision and the <em>human narrative</em> of that patient — who they are beyond the numbers, what brought them to this moment.</div></div>
    <div class="iface-card"><div class="iface-icon">⏱️</div><div class="iface-title">Real-Time Drama Engine</div><div class="iface-desc">Emergency medicine operates in minutes. The engine generates prose in <em>compressed time</em> — each paragraph is a minute, each sentence a decision. The reader experiences the temporal pressure of the resuscitation bay.</div></div>
    <div class="iface-card"><div class="iface-icon">🧑‍⚕️</div><div class="iface-title">Team Dynamics Narrator</div><div class="iface-desc">A trauma activation involves 8–12 people with defined roles. The engine narrates the resuscitation as an <em>ensemble piece</em> — each team member's action, their decision, their internal state, composited into a single cinematic sequence.</div></div>
    <div class="iface-card"><div class="iface-icon">📋</div><div class="iface-title">Case Debrief Storyteller</div><div class="iface-desc">Post-code and post-trauma debriefs are told as <em>literary analysis</em> — what happened, what was done well, what could have been different — in prose that honors the clinical reasoning and the emotional aftermath equally.</div></div>
    <div class="iface-card"><div class="iface-icon">🌙</div><div class="iface-title">Night Shift Chronicle</div><div class="iface-desc">A twelve-hour overnight shift as a novel chapter: the patients, the decisions, the moments of unexpected grace, the moments of failure. Every EM shift is a story. The engine makes it readable by morning.</div></div>
    <div class="iface-card"><div class="iface-icon">🌐</div><div class="iface-title">Arabic War Literature Register</div><div class="iface-desc">Arabic emergency medicine prose draws from the tradition of Arabic war poetry and resistance literature — <em>the urgency of al-Mutanabbi, the precision of al-Jahiz</em> — to create a register that is native to Arabic literary tradition.</div></div>
  </div>
</section>

        <div class="novel-en">Black Tag</div>
        <div class="novel-ar" lang="ar">العلامة السوداء</div>
        <div class="novel-p">A mass casualty event — a building collapse — seen from the perspective of the triage physician who places the black tags. The novel follows five patients across a single night: three red, one yellow, one black. The black tag patient survives. The triage physician has to live with the decision they made, and the outcome that proved them wrong, for the rest of their career.</div>
        <div class="novel-tags"><span class="novel-tag">Mass Casualty</span><span class="novel-tag">Triage Ethics</span><span class="novel-tag">Temp 0.85</span><span class="novel-tag">EN+AR</span></div>

      <div>
        <div class="novel-en">3:12 AM</div>
        <div class="novel-ar" lang="ar">الثالثة والثانية عشرة صباحاً</div>
        <div class="novel-p">A cardiac arrest at 3:12 AM, told in real time — minute by minute, compression by compression, drug by drug. The novel is thirty minutes long. Every sentence is a decision. Every paragraph is a minute of CPR. The patient's identity is revealed in the final chapter, which takes place in the ICU three weeks later.</div>
        <div class="novel-tags"><span class="novel-tag">Cardiac Arrest</span><span class="novel-tag">Real-Time Narrative</span><span class="novel-tag">Temp 0.90</span><span class="novel-tag">EN+AR</span></div>

        <div class="novel-ar" lang="ar">التسليم</div>
        <div class="novel-p">A twelve-hour overnight EM shift, structured as a relay race. The outgoing team hands over to the incoming team at 7 AM. The novel is the handover conversation — forty-five minutes in which two physicians communicate everything that happened to eighteen patients over the preceding twelve hours. The entire overnight, condensed into a morning meeting that decides who lives and who waits.</div>
