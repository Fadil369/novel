<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">The brain<br><em>as protagonist.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>SynapseForge</strong> is the cinematic medical novelist engine for neurology — a tool that transforms the clinical language of action potentials, demyelination, and cerebrovascular accidents into prose that reads like a psychological thriller written by someone who has sat with both Oliver Sacks and Dostoevsky.</p>
    <p>Neurology is the specialty where the organ being studied is also the organ doing the studying. The brain examining its own pathology creates an epistemological crisis no other specialty faces. SynapseForge honors this paradox by making the brain itself the narrator — unreliable, partial, sometimes deliberately misleading.</p>
    <p><strong>SynapseForge does not explain the nervous system.</strong> It dramatizes the experience of a nervous system that is failing — and the clinical detective story of the physician who must diagnose a storyteller that cannot tell the truth about its own symptoms.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>SynapseForge هو محرك الروائي الطبي السينمائي لطب الأعصاب — أداة تحوّل اللغة السريرية لجهود الفعل والتحليل والحوادث الوعائية الدماغية إلى نثر يُقرأ كرواية بوليسية نفسية.</p>
    <p>SynapseForge لا يشرح الجهاز العصبي. بل يُدرّج تجربة جهاز عصبي يفشل — وقصة المحقق السريري الذي يجب أن يشخّص راوياً لا يستطيع قول الحقيقة عن أعراضه الخاصة.</p>
  </div></div>
</section>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The neuron's<br><em>confession.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Organ Has a Voice</div>
    <div class="lens-fact">RAW FACT: In ischemic stroke, 1.9 million neurons die every minute of untreated occlusion. An action potential travels at up to 120 m/s — yet no signal can save what the clot has silenced.</div>
    <div class="lens-en">
      In the minute before the ambulance arrived, <strong>one million nine hundred thousand neurons died.</strong> Not metaphorically. Not approximately. Each one a tiny electrical city that went dark — a cluster of connections that will never fire again, a memory fragment, a motor pattern, a fragment of language, a piece of the accumulated self.<br><br>
      The phrase "time is brain" was invented by neurologists who understood that precision matters in a crisis. But it is the kind of precision that protects the physician from the full weight of the arithmetic. Say it differently: every minute of delay is a library burning. And no one is coming to save the books that have already turned to ash.<br><br>
      The brain, unlike any other organ, <em>knows</em> what it is losing. In the moments before the infarct silences the cortex, patients sometimes report a strange clarity — a sense that something irreplaceable is being taken. The brain writes its own elegy. The stroke is just the publisher.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">في الدقيقة التي سبقت وصول سيارة الإسعاف، مات مليون وتسعمائة ألف خلية عصبية. ليس مجازاً. كل واحدة منها كانت مدينة كهربائية صغيرة انطفأت — شظية ذاكرة، نمط حركي، شظية لغة. الدماغ، على عكس أي عضو آخر، يعرف ما الذي يخسره. في اللحظات التي تسبق صمت القشرة، يكتب الدماغ رثاءه الخاص. والسكتة الدماغية هي مجرد الناشر.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · The Seizure as Mutiny</div>
    <div class="lens-fact">RAW FACT: Epileptic seizures result from hypersynchronous, high-amplitude neuronal discharge. The healthy brain is characterized by desynchrony — epilepsy is the pathological imposition of perfect order.</div>
    <div class="lens-en">
      Here is the paradox at the center of epilepsy: <strong>the seizure is not chaos. It is the opposite of chaos.</strong> The healthy brain is a democracy of asynchronous signals — a hundred billion neurons each doing their own thing, each firing at their own cadence, the noise of independence creating the coherence of thought.<br><br>
      The seizure is a coup. A population of neurons — radicalized, synchronized, amplified — stops tolerating the democracy and begins broadcasting at the same frequency simultaneously. The electrical storm that results is not randomness. It is enforced unanimity. The brain, in a seizure, is marching in lockstep.<br><br>
      The neurologist's job, when the EEG shows those massive synchronized spikes, is to find who started the march — to locate the focus, the original agitator — and decide whether to silence it with molecules, or go in and remove the revolutionary cell body entirely.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">إليك المفارقة في قلب الصرع: النوبة ليست فوضى. إنها عكس الفوضى تماماً. الدماغ السليم ديمقراطية من الإشارات غير المتزامنة. النوبة انقلاب — مجموعة من الخلايا العصبية تتزامن وتبث على نفس التردد في آن واحد. مهمة طبيب الأعصاب: أن يجد من بدأ المسيرة، ويقرر ما إذا كان يُسكته بالجزيئات، أو يُزيل جسم الخلية الثورية كلياً.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Wall That Cannot Be Crossed</div>
    <div class="lens-fact">RAW FACT: The blood-brain barrier prevents approximately 98% of small molecules and nearly all large molecules from entering the CNS — making drug delivery to the brain one of medicine's greatest unsolved problems.</div>
    <div class="lens-en">
      We have mapped the human genome. We have sent imaging machines into the deepest structures of the brain and returned with pictures so precise they show individual cortical layers. And yet, in the middle of all this capability, there stands a wall that medicine has spent fifty years trying to breach and largely cannot: <strong>the blood-brain barrier.</strong><br><br>
      It is not a wall in the architectural sense. It is a biological philosophy — a decision made by evolution four hundred million years ago that the brain is too important to be accessible. The endothelial cells of the cerebral vasculature are so jealously selective that 98% of the drugs we develop for neurological disease cannot reach their target organ.<br><br>
      Which means: we have treatments for Alzheimer's, for glioblastoma, for treatment-resistant depression — that work perfectly in a test tube, and cannot get through a vessel wall three cells thick. <em>The question is not whether we can design the molecule. It is whether we can ever deliver it.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">رسمنا خريطة الجينوم البشري وصوّرنا أعمق بنى الدماغ. ومع ذلك يقف جدار أمضت الطب خمسين عاماً في محاولة اختراقه: الحاجز الدموي الدماغي. إنه فلسفة بيولوجية — قرار اتخذه التطور بأن الدماغ مهم جداً ليكون في متناول أي شيء. 98% من الأدوية لا تصل إلى عضوها المستهدف. السؤال ليس ما إذا كنا نستطيع تصميم الجزيء. بل ما إذا كنا سنستطيع يوماً توصيله.</div>
  </div>
</section>

  <div class="act-grid">

      <div class="act-title">The Missing Word</div>
      <div class="act-scene">"Professor Hamid was mid-lecture when he lost the word for 'beautiful.' He paused. Searched. Replaced it with 'good' and continued. His students noticed nothing. His wife, in the front row as always, noticed everything. She had heard him use that word ten thousand times. He had never fumbled it before."</div>
      <div class="act-clinical">54-year-old male · Sudden word-finding difficulty<br>No headache, no weakness noted by patient<br>3 hours from onset to presentation</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Diagnosis</div>
      <div class="act-title">The Shadow in Broca's Area</div>
      <div class="act-scene">"The MRI showed restricted diffusion in the left inferior frontal gyrus — Broca's area. The radiologist's report said: 'Acute ischemic infarct, 1.2 cm.' The neurologist read it and thought: the sentence is dying. The man still exists. The sentence is dying."</div>
      <div class="act-clinical">MRI DWI: acute infarct left IFG<br>MRA: M2 branch left MCA occlusion<br>NIHSS: 4 · Within tPA window</div>
    </div>
    <div class="act-cell">

      <div class="act-title">tPA and the Return</div>
      <div class="act-scene">"They gave the tPA at 11:47 AM — within the three-hour window. By 5 PM, he used the word 'beautiful' describing the afternoon light through the hospital window. Slightly effortful. The 'b' taking a fraction of a second longer than before. But there. Unmistakably there."</div>
      <div class="act-clinical">IV tPA administered · NIHSS 4 → 1<br>No hemorrhagic conversion on follow-up MRI<br>Speech therapy initiated · Excellent prognosis</div>

        <div class="novel-p">Told from the perspective of a single synapse in Broca's area — from the day it first formed in a two-year-old's developing cortex, through sixty years of language, through the morning of the stroke, through the hours of tPA-mediated reperfusion, through the slow return of the word "beautiful." A love story between a neuron and its target.</div>
