<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">Reading<br><em>darkness.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>ShadowForge</strong> is the cinematic medical novelist engine for radiology — a tool that transforms Hounsfield units, signal intensities, and radiological findings into prose that reads like film noir written by a detective who has never once examined a patient in person, but knows more about the inside of their body than their own physician.</p>
    <p>Radiology is the only medical specialty practiced entirely through representation. The radiologist never touches the patient. They read an image — a rendering of electromagnetic waves through tissue — and from that two-dimensional abstraction, they reconstruct a three-dimensional truth. They read darkness for a living. Every shadow has a differential. Every bright spot has a story. Every silence in an image — the absence of enhancement, the absence of signal — is as meaningful as what is present.</p>
    <p><strong>ShadowForge does not describe imaging findings.</strong> It narrates the act of seeing — the interpretive act of a physician who has trained for fifteen years to read what the body cannot say out loud, written into the shadows of its own anatomy.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>ShadowForge هو محرك الروائي الطبي السينمائي للأشعة — يحوّل وحدات هاونسفيلد وكثافات الإشارة والنتائج الإشعاعية إلى نثر يُقرأ كرواية نوار كتبها محقق لم يفحص مريضاً قط وجهاً لوجه، لكنه يعرف داخل جسمه أكثر مما يعرفه طبيبه الخاص.</p>
    <p>ShadowForge لا يصف نتائج التصوير. بل يروي فعل الرؤية — الفعل التفسيري لطبيب تدرّب خمس عشرة سنة ليقرأ ما لا يستطيع الجسم قوله بصوت عالٍ.</p>
  </div></div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The image<br><em>as confession.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Radiologist as Detective</div>
    <div class="lens-fact">RAW FACT: A pulmonary nodule of 8mm on CT carries a 1–5% malignancy risk. A nodule above 15mm carries 50–60% risk. Size, density (solid vs. ground-glass), spiculation, and location all modify the probability. The radiologist must construct a differential from a shadow.</div>
    <div class="lens-en">
      The nodule is 11 millimeters. It sits in the right upper lobe — the lung's most suspicious neighborhood, the district most frequented by malignancy. <strong>It has spiculated margins: thin projections extending into the surrounding parenchyma like fingers reaching into a crowd, or like roots, or like the tentative beginning of an invasion.</strong><br><br>
      The radiologist studies it for three minutes. Pulls up the prior CT from eighteen months ago — 7 millimeters then, 11 now. Growth rate: roughly 2.7 mm per year. Too slow for a typical infection. Too fast for a hamartoma. The Lung-RADS category climbs in his mind: 3, then 4A, then 4B as the spiculation registers fully.<br><br>
      He has never met this patient. He does not know their name yet — the CT came with an accession number, not a face. But he knows, with the quiet certainty of a detective who has read ten thousand chests, that someone needs to make a phone call today. <em>The image confessed. His job was to listen.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">العقيدة 11 ملليمتراً. تجلس في الفص العلوي الأيمن — حي الرئة الأكثر ريبة. لها حواف ذات نتوءات — امتدادات رفيعة تمتد إلى الحمة المحيطة كأصابع تمتد نحو حشد. طبيب الأشعة يدرسها ثلاث دقائق. يستدعي التصوير المقطعي السابق قبل ثمانية عشر شهراً — 7 ملليمتر آنذاك، 11 الآن. لم يلتقِ هذا المريض قط. لا يعرف اسمه بعد. لكنه يعلم بيقين هادئ كمحقق قرأ عشرة آلاف صدر: يجب أن يتصل شخص ما اليوم. الصورة اعترفت. مهمته كانت الاستماع.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · The MRI as Time Machine</div>
    <div class="lens-fact">RAW FACT: MRI with gadolinium contrast reveals the blood-brain barrier breakdown in conditions like MS plaques, brain metastases, and gliomas. The pattern of enhancement tells a story about the age, activity, and nature of the lesion.</div>
    <div class="lens-en">
      The gadolinium arrives in the bloodstream like a light in a dark house. Wherever the blood-brain barrier is intact — which is most of the brain, in a healthy scan — it stays outside. <strong>Wherever the barrier has broken, wherever something has gone wrong, the gadolinium floods in. It illuminates the wound.</strong><br><br>
      In this patient's MRI, there are three lesions that enhance — three bright islands in a dark sea, each one a place where something has breached the wall. The neuroradiologist begins the forensic analysis: the largest lesion shows ring enhancement, thick and irregular — the pattern of an aggressive process, possibly a glioblastoma, possibly a metastasis from somewhere not yet found. The two smaller ones show incomplete rings — a different age, a different story.<br><br>
      Three lesions. Three different chapters of the same disease. The MRI is not a snapshot. It is a crime scene with multiple timelines.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">الغادولينيوم يصل إلى مجرى الدم كضوء في منزل مظلم. أينما كان الحاجز الدموي الدماغي سليماً يبقى خارجه. أينما اخترق شيء ما — يفيض الغادولينيوم ويضيء الجرح. في هذا التصوير بالرنين المغناطيسي، ثلاث آفات تُعزّز — ثلاث جزر مضيئة في بحر مظلم. كل منها مكان اختُرق فيه الجدار. التصوير بالرنين المغناطيسي ليس لقطة. إنه مسرح جريمة بجداول زمنية متعددة.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Incidentaloma</div>
    <div class="lens-fact">RAW FACT: "Incidentalomas" — incidental findings on imaging ordered for another indication — affect 1–2% of all CT scans. They create a cascade of follow-up imaging, biopsies, and anxiety for findings that are often benign.</div>
    <div class="lens-en">
      She came in for a kidney stone. The CT KUB was ordered at 11 PM, read at 2 AM. The kidney stone was there — 4 mm, right ureter, clinically significant, the radiologist noted it and moved on. But <strong>then the eye caught something in the right adrenal gland.</strong><br><br>
      A 2.3 cm lesion. Incidental. Unrelated to the reason for the scan. The Hounsfield units were 28 — above the 10 HU threshold that suggests lipid-poor, and therefore potentially non-adenoma. The radiologist typed the addendum: "Incidentally noted right adrenal lesion measuring 2.3 cm. Recommend dedicated adrenal CT with washout protocol."<br><br>
      She was told about the kidney stone. She was also told — at 2 AM, by a nurse reading a report — that there was something on her adrenal gland that needed further evaluation. She went home and searched the internet until morning. <em>The kidney stone resolved in four days. The adrenal workup took six months, four additional scans, a biopsy, and three visits to an endocrinologist. The lesion was a benign adenoma. The radiologist had done the right thing. And it had cost her six months of her life in fear.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">جاءت بسبب حصوة كلوية. لكن العين التقطت شيئاً في الغدة الكظرية اليمنى — آفة 2.3 سم، عَرَضية، لا علاقة لها بسبب الفحص. أُبلغت بحصوة الكلى. وأُبلغت أيضاً — في الساعة الثانية صباحاً، بواسطة ممرضة تقرأ تقريراً — بأن هناك شيئاً في غدتها الكظرية يحتاج تقييماً إضافياً. الحصوة انحلّت في أربعة أيام. تقييم الغدة الكظرية استغرق ستة أشهر من حياتها في الخوف. الآفة كانت ورماً غدياً حميداً. طبيب الأشعة فعل الشيء الصحيح.</div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">C — The Architect</div>
  <h2 class="sec-title">Three acts.<br><em>One dark room.</em></h2>
  <div class="act-grid">
    <div class="act-cell">
      <div class="act-num">Act I — The Symptom</div>
      <div class="act-title">The Cough He Ignored</div>
      <div class="act-scene">"Twelve weeks. He'd been coughing for twelve weeks and told himself it was the dry season, then the air conditioning, then the cat. He went to the GP for a prescription renewal and mentioned it in passing. The GP ordered a chest X-ray. The radiologist's report arrived six hours later: 'Right hilar mass. Further imaging strongly recommended.'"</div>
      <div class="act-clinical">64-year-old male · 12-week cough · Ex-smoker 15 years<br>Chest X-ray: right hilar enlargement<br>No hemoptysis · No weight loss initially reported</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Diagnosis</div>
      <div class="act-title">The CT Confession</div>
      <div class="act-scene">"The CT showed a 4.2 cm spiculated mass in the right hilum with mediastinal lymphadenopathy. PET scan showed FDG-avid nodes in the contralateral mediastinum. The staging radiologist wrote: 'Findings consistent with primary lung malignancy, stage IIIB minimum.' The patient had never been told what 'IIIB' meant. The radiologist had written it in the language of accuracy. It needed to be translated into the language of a human life."</div>
      <div class="act-clinical">CT: 4.2 cm right hilar mass, mediastinal LAD<br>PET: FDG-avid contralateral N3 disease<br>Stage IIIB NSCLC · EGFR/ALK/PD-L1 pending</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act III — The Outcome</div>
      <div class="act-title">Reading the Response</div>
      <div class="act-scene">"After six cycles of carboplatin-pemetrexed plus pembrolizumab, the CT showed the mass had shrunk to 1.8 cm. The mediastinal nodes were no longer PET-avid. The radiologist wrote: 'Partial metabolic response. No new lesions.' He read his own report and thought: this is the best news I will write today. And then he opened the next scan."</div>
      <div class="act-clinical">Partial metabolic response · 57% size reduction<br>Nodes: no FDG avidity on follow-up PET<br>Maintenance pembrolizumab · Surveillance imaging</div>
    </div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">D — The Ghost Doctor</div>
  <h2 class="sec-title">CLINICALLINC<br><em>reads every pixel.</em></h2>
  <div class="ghost-block">
    <div class="ghost-header">👻 CLINICALLINC · Radiology Accuracy Specifications</div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Lung-RADS categories (1–4X) are used for CT lung cancer screening. Incidental pulmonary nodules follow Fleischner Society guidelines. These systems are never conflated in prose.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> HU (Hounsfield units) thresholds: air = -1000, water = 0, soft tissue = 20–80, bone = 400+. Adrenal adenomas typically ≤10 HU on unenhanced CT. The 10 HU threshold is never dramatized as absolute.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Gadolinium contrast is renally cleared and contraindicated in severe renal impairment (eGFR &lt;30) due to nephrogenic systemic fibrosis risk. This is never bypassed in prose for dramatic convenience.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Radiologists report findings — they do not diagnose or treat. The referring clinician receives the report and communicates with the patient. This clinical chain is preserved in all prose.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> BIRADS, Lung-RADS, PI-RADS, LI-RADS — structured reporting systems exist for breast, lung, prostate, and liver lesions respectively. Prose that involves these organs uses the correct system.</span></div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">E — The Interface</div>
  <h2 class="sec-title">The Alchemy<br><em>Studio.</em></h2>
  <div class="iface-grid">
    <div class="iface-card"><div class="iface-icon">🔍</div><div class="iface-title">Radiological Report Novelist</div><div class="iface-desc">Paste any radiology report and the engine generates two outputs: a <em>patient narrative</em> (what this means in human terms) and a <em>referring physician briefing</em> (what clinical action this demands, in literary form).</div></div>
    <div class="iface-card"><div class="iface-icon">🌑</div><div class="iface-title">Modality Voice Generator</div><div class="iface-desc">Each imaging modality has its own literary voice. <em>X-ray</em>: stark, noir, high contrast. <em>MRI</em>: layered, temporal, atmospheric. <em>PET</em>: metabolic heat maps as emotional maps. <em>Ultrasound</em>: intimate, real-time, uncertain.</div></div>
    <div class="iface-card"><div class="iface-icon">🕵️</div><div class="iface-title">Differential Diagnosis Drama</div><div class="iface-desc">A radiological finding generates a <em>cast of suspects</em> — each differential diagnosis character-profiled with its imaging characteristics, its clinical presentation, its likelihood, and its narrative arc if it turns out to be correct.</div></div>
    <div class="iface-card"><div class="iface-icon">📅</div><div class="iface-title">Temporal Comparison Engine</div><div class="iface-desc">Two scans, separated by time. The engine generates the narrative of what changed — the growth, the regression, the new lesion, the resolving finding — as a <em>chapter in an ongoing story</em>, not a comparison report.</div></div>
    <div class="iface-card"><div class="iface-icon">🧪</div><div class="iface-title">Incidentaloma Ethics Module</div><div class="iface-desc">The ethical narrative of the incidental finding — what it means to find something that wasn't being looked for, how to communicate it, what the downstream cascade costs the patient — explored as <em>medical humanities prose</em>.</div></div>
    <div class="iface-card"><div class="iface-icon">🌐</div><div class="iface-title">Arabic Visual Poetry</div><div class="iface-desc">Arabic radiology prose draws from the tradition of Arabic visual description — <em>wasf</em>, the classical Arabic genre of detailed visual depiction — to create a radiological poetry that is native to the language.</div></div>
  </div>
</section>

<section class="fade">
  <div class="sec-label">G — The Library</div>
  <h2 class="sec-title">Three novels.<br><em>In the dark room.</em></h2>
  <div class="lib-grid">
    <div class="novel-card">
      <div class="novel-n">01</div>
      <div>
        <div class="novel-en">The Report</div>
        <div class="novel-ar" lang="ar">التقرير</div>
        <div class="novel-p">A radiologist reads forty chest CTs in a single overnight shift — and the novel follows each one as a chapter in a mystery novel. Some reports are routine. Three are not. One contains a finding that changes a life. The radiologist never knows which ones. They write the reports, send them into the system, and move on. The novel tells us what happened to each patient after the report was sent.</div>
        <div class="novel-tags"><span class="novel-tag">Radiology Noir</span><span class="novel-tag">Ensemble</span><span class="novel-tag">Temp 0.65</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">02</div>
      <div>
        <div class="novel-en">10 Hounsfield Units</div>
        <div class="novel-ar" lang="ar">عشر وحدات هاونسفيلد</div>
        <div class="novel-p">An adrenal incidentaloma — found on a scan ordered for something entirely unrelated — drives a six-month odyssey through the medical system. Told from the perspective of the lesion itself: a benign adenoma that never asked to be found, never intended to cause harm, and spent six months being treated as a suspect in a crime it did not commit.</div>
        <div class="novel-tags"><span class="novel-tag">Incidentaloma</span><span class="novel-tag">First-Person Lesion</span><span class="novel-tag">Temp 0.75</span><span class="novel-tag">Medical Satire</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">03</div>
      <div>
        <div class="novel-en">The Man Who Read Shadows</div>
        <div class="novel-ar" lang="ar">الرجل الذي قرأ الظلال</div>
        <div class="novel-p">A portrait of a chest radiologist over thirty years of practice — from the era of film to digital, from analog to AI-assisted. The novel is structured as a series of cases, each one memorable for a different reason: the finding that was missed, the finding that saved a life, the finding that revealed a truth no one wanted to know. A meditation on interpretation, certainty, and what it means to have seen everything.</div>
        <div class="novel-tags"><span class="novel-tag">Radiology Career</span><span class="novel-tag">Literary Portrait</span><span class="novel-tag">Temp 0.60</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
  </div>
</section>
