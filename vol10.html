<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">The genome as<br><em>ancient novel.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>CodeForge</strong> is the cinematic medical novelist engine for genetics and genomics — a tool that transforms the clinical language of mutations, inheritance patterns, gene expression, and CRISPR-based gene editing into prose that reads like science fiction written by a molecular biologist who has just realized that the story has already been written, four billion years ago, and we have only recently learned how to read it.</p>
    <p>The human genome contains 3 billion base pairs. In those base pairs is encoded everything about a person's biology — their disease risks, their drug responses, their developmental blueprint — along with vast stretches of sequence whose function remains unknown, interspersed with the remnants of ancient viral infections and evolutionary experiments that were never fully abandoned. The genome is not a clean document. It is a manuscript that has been written, revised, partially erased, infected, annotated, and passed down through four billion years of copying errors.</p>
    <p><strong>CodeForge does not describe genetics.</strong> It narrates the reading and rewriting of the oldest text in biology — from the first genetic counseling conversation to the CRISPR edit that might change the sequence forever, from the inherited disease passed through five generations to the de novo mutation that appeared in a single cell division and will not pass to the next generation unless it is corrected.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>CodeForge هو محرك الروائي الطبي السينمائي للجينات والجينوميات — يحوّل لغة الطفرات وأنماط التوارث والتعبير الجيني وتحرير الجينات إلى نثر يُقرأ كخيال علمي كتبه عالم أحياء جزيئية أدرك للتو أن القصة قد كُتبت بالفعل، قبل أربعة مليارات سنة، وأننا تعلمنا قراءتها مؤخراً فحسب.</p>
    <p>CodeForge لا يصف علم الوراثة. بل يروي قراءة وإعادة كتابة أقدم نص في علم الأحياء.</p>
  </div></div>
</section>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The code<br><em>reads itself.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Genome as Palimpsest</div>
    <div class="lens-fact">RAW FACT: Approximately 8% of the human genome consists of endogenous retroviruses — ancient viral DNA that integrated into germ line cells millions of years ago and has been passed down ever since. Some of these sequences have been co-opted by the human body for essential functions, including placental development.</div>
    <div class="lens-en">
      In the genome, there are sequences that do not belong to us. Not in the sense of being foreign — they have been part of the genome for forty million years, passed down faithfully through every generation since. <strong>They belong to us more than we can claim anything else.</strong> But they are, in their origin, viral. Ancient retroviruses, long extinct as infectious agents, that integrated into the germ line of our ancestors and never left.<br><br>
      Eight percent of the human genome is composed of these endogenous retroviruses. Not junk — not entirely. Some have been recruited. Some ERV sequences now regulate essential genes. Some are involved in forming the syncytiotrophoblast — the multinucleated layer of the placenta that interfaces between mother and fetus. A viral protein, repurposed by evolution, now makes human pregnancy possible.<br><br>
      The genome is not a clean text. It is a document that has been infected, annotated, partially erased, and written over — every layer still readable if you know where to look. <em>We did not write this novel. We were written by it, four billion years of authors whose names we will never know.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">في الجينوم توجد تسلسلات لا تنتمي إلينا. ليس بمعنى كونها أجنبية — فهي جزء من الجينوم منذ أربعين مليون سنة، تنتقل بأمانة عبر كل جيل منذ ذلك الحين. إنها في أصلها فيروسية. 8% من الجينوم البشري يتكون من هذه الفيروسات الرجعية الداخلية. الجينوم ليس نصاً نظيفاً. إنه وثيقة أُصيبت وعُلِّقت عليها ومُحيت جزئياً وكُتبت من جديد — كل طبقة لا تزال قابلة للقراءة إذا عرفت أين تنظر. لم نكتب هذه الرواية. كُتبنا بها، أربعة مليارات سنة من المؤلفين الذين لن نعرف أسماءهم أبداً.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · CRISPR as the First Rewrite</div>
    <div class="lens-fact">RAW FACT: CRISPR-Cas9 uses a guide RNA to direct the Cas9 endonuclease to a specific DNA sequence, creating a double-strand break. The cell's repair mechanisms then either disrupt (NHEJ) or correct (HDR) the gene. In 2023, the first CRISPR therapy (Casgevy) was approved for sickle cell disease and beta-thalassemia.</div>
    <div class="lens-en">
      For four billion years, the genome could only be edited by evolution — a process that required generations, selection pressure, and enormous time. <strong>In 2012, a molecular scissors called CRISPR-Cas9 reduced that timeline to hours.</strong><br><br>
      The guide RNA is the address. It is a short sequence of RNA, approximately 20 nucleotides, that is complementary to the target DNA sequence. It carries the Cas9 protein to the exact location in the genome where the edit needs to be made. At that location, the Cas9 cuts both strands of the double helix. The genome, suddenly broken, triggers its own repair mechanisms. And here is where the choice is made: NHEJ — the fast, imprecise repair that typically disables the gene — or HDR, the slower, template-guided repair that can correct a mutation to the exact desired sequence.<br><br>
      Casgevy — the first approved CRISPR therapy — reactivates HbF in patients with sickle cell disease and beta-thalassemia. The genome is not healed. <em>It is taught to work around the mutation it will always carry — to remember a fetal version of itself that was never meant to persist, and to make it persist anyway.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">لأربعة مليارات سنة، لم يكن بإمكان أحد تحرير الجينوم إلا بالتطور. في عام 2012، قللت المقص الجزيئي CRISPR-Cas9 هذا الجدول الزمني إلى ساعات. RNA الدليل هو العنوان. يحمل بروتين Cas9 إلى الموقع الدقيق في الجينوم. الجينوم يُقطع فجأة ويُحفّز آليات إصلاحه الخاصة. كاسجيفي — أول علاج CRISPR معتمد — يُعيد تنشيط HbF في مرضى فقر الدم المنجلي. الجينوم لا يُشفى. إنه يُعلَّم للعمل حول الطفرة التي سيحملها دائماً.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Variant of Uncertain Significance</div>
    <div class="lens-fact">RAW FACT: Whole genome sequencing returns, on average, 4-5 million variants per person. Most are benign. Some are pathogenic. A significant proportion are Variants of Uncertain Significance (VUS) — variants that exist, that affect the protein sequence, but whose clinical significance is unknown. A VUS can cause years of uncertainty.</div>
    <div class="lens-en">
      The genetic counselor reads the report. Thirty-seven pages. At the top of the relevant section, in bold: <strong>BRCA2 c.8878A>G (p.Met2960Val) — VARIANT OF UNCERTAIN SIGNIFICANCE.</strong><br><br>
      The variant exists. It changes an amino acid in the BRCA2 protein at position 2960 — from methionine to valine. Whether this change matters — whether it disrupts the protein's function in DNA repair, whether it increases breast cancer risk, whether it changes anything at all — is unknown. Not to this patient. Not to this counselor. Not to any of the computational models, population databases, or functional studies that have been brought to bear on this question. Unknown.<br><br>
      The patient received her result by letter. The letter said, in language carefully calibrated by a dozen genetics specialists: "A variant has been found in BRCA2. We are uncertain of its clinical significance." She read it in her car, in a hospital parking lot, at 2 PM on a Tuesday. She sat there for forty minutes before driving home. <em>Medicine had sequenced her genome in four days, identified a change in a single letter of three billion, and had no idea what it meant. She was left to live inside that uncertainty for however long it takes science to resolve it.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">المستشار الجيني يقرأ التقرير. في أعلى القسم ذي الصلة، بالخط العريض: BRCA2 — متغير ذو أهمية غير مؤكدة. المتغير موجود. هل يُهم — هل يُعطّل وظيفة البروتين، هل يزيد خطر سرطان الثدي — مجهول. ليس لهذه المريضة. ليس لهذا المستشار. ليس لأي من النماذج الحسابية أو قواعد بيانات السكان. مجهول. الطب رتّب تسلسل جينومها في أربعة أيام، وحدّد تغييراً في حرف واحد من ثلاثة مليارات، ولم يكن لديه أي فكرة عما يعنيه. تُركت لتعيش داخل تلك الحالة من الغموض إلى أن يحلّها العلم.</div>
  </div>
</section>

<section class="fade">
  <div class="sec-label">C — The Architect</div>
  <h2 class="sec-title">Three acts.<br><em>Three billion letters.</em></h2>
  <div class="act-grid">
    <div class="act-cell">
      <div class="act-num">Act I — The Inheritance</div>
      <div class="act-title">Five Generations</div>
      <div class="act-scene">"She brought the family history to the genetics clinic on a folded piece of paper. Three maternal aunts with breast cancer. Her mother. Her grandmother. On one side, written in her own handwriting: 'Am I next?' The geneticist looked at the pedigree and saw what she saw: a pattern of dominant inheritance moving through the maternal line with the inexorability of a tide. They needed to look at the sequence."</div>
      <div class="act-clinical">38-year-old female · Strong FH breast/ovarian Ca<br>Mother: BRCA1 positive · 3 maternal aunts affected<br>Pre-test counseling · Informed consent obtained</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Sequence</div>
      <div class="act-title">BRCA1 Pathogenic</div>
      <div class="act-scene">"The result came back in three weeks. BRCA1 c.5266dupC (p.Gln1756Profs*74) — Pathogenic. The same variant her mother carried. The same variant her grandmother carried. A single duplicated cytosine, frameshift, protein truncation, lifetime breast cancer risk of 72%, ovarian cancer risk of 44%. The genetic counselor delivered the result and then sat in silence while the patient decided what to do with the information that her own genome had held, unknown, for 38 years."</div>
      <div class="act-clinical">BRCA1 c.5266dupC — Pathogenic<br>Lifetime BC risk: 72% · OC risk: 44%<br>Options: enhanced surveillance vs. risk-reducing surgery</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act III — The Decision</div>
      <div class="act-title">The Rewrite</div>
      <div class="act-scene">"She chose bilateral risk-reducing mastectomy. 'I am rewriting the story my genome wrote for me,' she said to the surgeon. 'I know I can't change the sequence. But I can change what it means.' Her daughter — 14, not yet old enough to be tested — watched her mother make that decision and understood something about inheritance that no genetics textbook could have taught her: sometimes the most important thing you pass down is the knowledge of what you carry."</div>
      <div class="act-clinical">Bilateral risk-reducing mastectomy<br>Pathology: no evidence of malignancy<br>Daughter to be offered testing at age 18</div>
    </div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">D — The Ghost Doctor</div>
  <h2 class="sec-title">CLINICALLINC<br><em>reads the sequence.</em></h2>
  <div class="ghost-block">
    <div class="ghost-header">👻 CLINICALLINC · Genetics & Genomics Accuracy Specifications</div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> BRCA1 lifetime breast cancer risk is approximately 72% (range 50–85% depending on variant) and ovarian cancer risk approximately 44% by age 80. BRCA2 carries lower (but still substantially elevated) risks. Figures are not invented for dramatic effect.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> CRISPR-Cas9 mechanism: guide RNA directs Cas9 to target sequence → double-strand break → NHEJ (imprecise, disruptive) or HDR (precise, template-guided). Off-target effects are a real clinical concern and are not dismissed in prose.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Casgevy (exa-cel) mechanism: reactivates HbF by disrupting BCL11A enhancer in HSCs via CRISPR-Cas9, not by correcting the HbS mutation itself. The distinction is preserved in all prose.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> VUS (Variant of Uncertain Significance) classification follows ACMG/AMP guidelines. A VUS is not pathogenic and not benign — it is genuinely uncertain. Prose never implies the uncertainty is due to physician inadequacy.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Inheritance patterns: autosomal dominant (one allele sufficient), autosomal recessive (both alleles required), X-linked, mitochondrial. Penetrance and expressivity modulate phenotype. These distinctions are preserved in all narrative genetics.</span></div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">E — The Interface</div>
  <h2 class="sec-title">The Alchemy<br><em>Studio.</em></h2>
  <div class="iface-grid">
    <div class="iface-card"><div class="iface-icon">📖</div><div class="iface-title">Genome as Novel Engine</div><div class="iface-desc">The 3 billion base pairs of the human genome parsed as literary chapters: <em>exons</em> as the plot, <em>introns</em> as the editorial cuts, <em>promoters</em> as the chapter titles, <em>enhancers</em> as the dramatic pacing. The genome read as a text with literary structure.</div></div>
    <div class="iface-card"><div class="iface-icon">🏛️</div><div class="iface-title">Pedigree Story Generator</div><div class="iface-desc">Input a family pedigree and the engine generates the <em>multigenerational narrative</em> of the inheritance — who carried the variant without knowing, who was affected, who made the choice to be tested, who decided not to know. The pedigree as a family novel.</div></div>
    <div class="iface-card"><div class="iface-icon">✂️</div><div class="iface-title">CRISPR Drama Engine</div><parameter name="content">
    <div class="iface-desc">The CRISPR edit as a thriller: the guide RNA as the operative, the Cas9 as the instrument, the target sequence as the mark. <em>What could go wrong</em> — off-target effects, mosaicism, germline implications — told with the precision of a heist thriller where the stakes are the patient's genome.</div></div>
    <div class="iface-card"><div class="iface-icon">❓</div><div class="iface-title">VUS Uncertainty Narrative</div><div class="iface-desc">The Variant of Uncertain Significance as a literary genre: the patient who lives with not knowing, the researcher who works to classify it, the database that accumulates evidence over years. <em>Uncertainty as the subject of the novel, not just the context.</em></div></div>
    <div class="iface-card"><div class="iface-icon">🔭</div><div class="iface-title">Pharmacogenomics Profiler</div><div class="iface-desc">CYP2D6 ultrarapid metabolizer. HLA-B*5701 and abacavir hypersensitivity. TPMT deficiency and thiopurine toxicity. Each pharmacogenomic variant is a story about <em>why the same drug kills one person and cures another</em> — the genome as the reader of the drug.</div></div>
    <div class="iface-card"><div class="iface-icon">🌐</div><div class="iface-title">Arabic Genomics Register</div><div class="iface-desc">Arabic genetics prose draws from the philosophical tradition of Arabic science — <em>Ibn Khaldun's cycles of heredity, al-Biruni's observation of inheritance patterns</em> — to create a cultural register that honors the Arabic scientific tradition in the genomic age.</div></div>
  </div>
</section>

<section class="fade">
  <div class="sec-label">G — The Library</div>
  <h2 class="sec-title">Three novels.<br><em>The code rewrites itself.</em></h2>
  <div class="lib-grid">
    <div class="novel-card">
      <div class="novel-n">01</div>
      <div>
        <div class="novel-en">The Oldest Manuscript</div>
        <div class="novel-ar" lang="ar">أقدم المخطوطات</div>
        <div class="novel-p">A genomicist sequences the genome of a 40,000-year-old Neanderthal and finds a BRCA1 variant — pathogenic in modern humans. The Neanderthal never lived long enough for it to matter. She then sequences her own genome and finds the same variant, inherited from a maternal lineage that traces back 40,000 years to the same population. A novel about what we inherit from people who are not remembered, and the disease that crossed forty millennia to reach her.</div>
        <div class="novel-tags"><span class="novel-tag">Ancient Genomics</span><span class="novel-tag">BRCA1</span><span class="novel-tag">Temp 0.80</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">02</div>
      <div>
        <div class="novel-en">The First Rewrite</div>
        <div class="novel-ar" lang="ar">التعديل الأول</div>
        <div class="novel-p">The biography of a sickle cell disease patient who receives Casgevy — the first CRISPR therapy. The novel follows the entire arc: the bone marrow harvest, the ex vivo editing, the conditioning chemotherapy, the infusion of edited cells, the twelve months of monitoring. Told from three perspectives: the patient, the hematologist, and — in experimental chapters — the edited cell, narrating its own transformation.</div>
        <div class="novel-tags"><span class="novel-tag">Sickle Cell · CRISPR</span><span class="novel-tag">Three Perspectives</span><span class="novel-tag">Temp 0.85</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">03</div>
      <div>
        <div class="novel-en">Uncertain</div>
        <div class="novel-ar" lang="ar">غير محدد</div>
        <div class="novel-p">A patient with a BRCA2 Variant of Uncertain Significance waits — for five years — as evidence accumulates about whether her variant is pathogenic. The novel spans those five years: the annual appointments with the genetic counselor, the database updates, the paper published that reclassifies hundreds of variants but not hers, the moment the evidence finally tips, and the conversation that follows. A novel about living inside an unfinished sentence.</div>
        <div class="novel-tags"><span class="novel-tag">BRCA2 VUS</span><span class="novel-tag">Genetic Uncertainty</span><span class="novel-tag">Temp 0.70</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
  </div>
</section>
