<section class="fade">
  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">Blood as<br><em>the original river.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>VeinForge</strong> is the cinematic medical novelist engine for hematology — a tool that transforms the clinical language of complete blood counts, coagulation cascades, and hematological malignancies into prose that reads like a river narrative in which the blood is the river, the bone marrow is the source, and the pathology is what happens when the source runs dry or floods.</p>
    <p>Blood is the only organ that is also a fluid. It travels the entire body in under sixty seconds. It carries oxygen and removes carbon dioxide, delivers nutrients and removes waste, transports hormones and immune signals, heals wounds and fights infection — and it does all of this simultaneously, without pausing, without resting, for the entire duration of a human life.</p>
    <p><strong>VeinForge does not describe hematological conditions.</strong> It narrates the life of blood — the twenty-day arc of a red blood cell from marrow to spleen, the platelet's moment of activation at a wound site, the lymphocyte's recognition of an antigen it has never seen but somehow remembers from a vaccine given decades ago.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>VeinForge هو محرك الروائي الطبي السينمائي لأمراض الدم — يحوّل لغة تعداد الدم الكامل وتسلسل التخثر والأورام الخبيثة الدموية إلى نثر يُقرأ كرواية نهر يكون فيه الدم هو النهر، ونخاع العظم هو المصدر.</p>
    <p>VeinForge لا يصف الحالات الدموية. بل يروي حياة الدم — القوس الذي يمتد عشرين يوماً لخلية الدم الحمراء من النخاع إلى الطحال، ولحظة تفعّل الصفيحة الدموية عند موقع الجرح.</p>
  </div></div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The blood's<br><em>long journey.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Red Cell's Twenty-Day Life</div>
    <div class="lens-fact">RAW FACT: A red blood cell lives for approximately 120 days, traveling roughly 300 miles through the circulatory system. It makes the full circuit of the body in under 60 seconds. It has no nucleus — it is pure function, carrying hemoglobin and nothing else.</div>
    <div class="lens-en">
      The red blood cell has no nucleus. No DNA. No ability to repair itself, divide, or change. It was made in the bone marrow with a nucleus — spent five days learning to synthesize hemoglobin — and then, on its fifth day of existence, expelled the nucleus entirely. <strong>It chose function over identity.</strong><br><br>
      What remained was essentially a bag of hemoglobin — a biconcave disk, 8 micrometers in diameter, flexible enough to squeeze through capillaries half its width. It carries oxygen on its hemoglobin like freight. It delivers. It returns. It repeats this circuit — lungs to body to lungs — three hundred miles of travel, fifty thousand laps of the circulation, over one hundred and twenty days.<br><br>
      And then, on day 120, the spleen recognizes it. The red cell has aged — its membrane is stiffer, its metabolism exhausted. The splenic sinusoids, those narrow channels that act as quality control, will not let it pass. The macrophages take it. The iron is reclaimed. The globin is recycled. The heme becomes bilirubin. <em>Nothing is wasted. The river does not lose its water. It simply redistributes it.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">خلية الدم الحمراء لا نواة لها. لا DNA. لا قدرة على إصلاح نفسها. صُنعت في نخاع العظم بنواة — أمضت خمسة أيام تتعلم تصنيع الهيموغلوبين — ثم، في يومها الخامس من الوجود، طردت النواة كلياً. اختارت الوظيفة على الهوية. ما بقي كان أساساً كيساً من الهيموغلوبين — قرصاً ثنائي التقعر، يحمل الأوكسجين كبضاعة، يسلّم ويعود ويكرر. في اليوم 120، يتعرف عليه الطحال. لا شيء يُهدر. النهر لا يفقد ماءه. هو فقط يعيد توزيعه.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · The Coagulation Cascade as Military Operation</div>
    <div class="lens-fact">RAW FACT: The coagulation cascade involves over 20 proteins. It can be initiated via the intrinsic pathway (contact activation) or extrinsic pathway (tissue factor exposure). Both converge at Factor X to generate thrombin, which converts fibrinogen to fibrin — the structural scaffold of a clot.</div>
    <div class="lens-en">
      The wound happens. In the next three seconds, the platelet response begins — circulating platelets, sensing exposed collagen and tissue factor at the injury site, activate and aggregate. They form the primary plug. But the primary plug is temporary — it will not hold.<br><br>
      The coagulation cascade is the engineering solution. Twenty proteins, assembled in sequence like a military operation where each unit's activation is the signal for the next unit to deploy. The intrinsic pathway begins with contact — the exposure of subendothelial surfaces that the blood was never meant to touch. The extrinsic pathway begins with tissue factor — the alarm signal from damaged tissue, released only when the barrier is breached.<br><br>
      <strong>They converge at Factor X.</strong> Factor Xa, with Factor Va as its cofactor, generates thrombin from prothrombin in a burst of enzymatic power — 1,000 molecules of thrombin per second per enzyme complex at peak activity. Thrombin cleaves fibrinogen to fibrin. Fibrin polymerizes into a mesh. The mesh is crosslinked by Factor XIII. The platelet plug is trapped within the fibrin scaffold. <em>The wound is sealed. The river is redirected around the breach. The flow continues.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">يحدث الجرح. في الثواني الثلاث التالية، يبدأ رد الصفيحات الدموية — تتحس الصفائح الكولاجين المكشوف وعامل الأنسجة وتتفعل وتتكتل. تشكل الجلطة الأولية. لكن الجلطة الأولية مؤقتة. تسلسل التخثر هو الحل الهندسي. عشرون بروتيناً، مجمّعة في تسلسل كعملية عسكرية حيث تفعّل كل وحدة هو إشارة للوحدة التالية. تتقاربان عند العامل X. الجرح يُختم. النهر يُحوَّل حول الثغرة. التدفق يستمر.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · The Leukemia That Looks Like Tiredness</div>
    <div class="lens-fact">RAW FACT: Acute myeloid leukemia (AML) can present with symptoms indistinguishable from anemia or burnout — fatigue, pallor, mild dyspnea. The FBC reveals the diagnosis: a WBC of 80,000 with 70% blasts, Hb of 6 g/dL, platelets of 15. The bone marrow has been replaced.</div>
    <div class="lens-en">
      She thought she was burned out. She was a doctor — she knew what burned out felt like, and this felt exactly like that. The tiredness after a full day that used to mean a good sleep but now meant a different kind of emptiness. The breathlessness on the stairs that she attributed to not having gone to the gym since February.<br><br>
      The FBC that her colleague ran as a favor — "just to rule out anemia" — showed:<br>
      WBC: 82,000 (ref 4,000–11,000)<br>
      Hemoglobin: 5.9 g/dL (ref 12–16)<br>
      Platelets: 12,000 (ref 150,000–400,000)<br>
      Differential: 74% blasts.<br><br>
      Her bone marrow had been replaced. Not gradually, not with any warning she had recognized. <strong>The river had been taken over.</strong> The blasts — immature, undifferentiated, dividing without purpose — had crowded out the red cells, the platelets, the neutrophils. Everything that blood does, blood can no longer do. <em>She was a physician who had just become a patient, and the diagnosis had arrived in a routine blood test ordered as a favor, on a Thursday afternoon, in a hospital corridor, between two other patients she still had to see.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">اعتقدت أنها محترقة مهنياً. كانت طبيبة — تعرف كيف يشعر الاحتراق المهني، وهذا الشعور مطابق تماماً. تعداد الدم الكامل الذي أجراه زميلها لصالحها — "فقط لاستبعاد فقر الدم" — أظهر: كريات بيضاء 82,000، هيموغلوبين 5.9، صفيحات 12,000، 74% أرومات. نخاع عظمها تمت الاستعاضة عنه. النهر قد جرى الاستيلاء عليه. كانت طبيبة تحولت للتو إلى مريضة، والتشخيص وصل في فحص دم روتيني، في ممر المستشفى، يوم خميس، بين مريضين لا تزال بحاجة إلى رؤيتهما.</div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">C — The Architect</div>
  <h2 class="sec-title">Three acts.<br><em>The river's account.</em></h2>
  <div class="act-grid">
    <div class="act-cell">
      <div class="act-num">Act I — The Symptom</div>
      <div class="act-title">Epistaxis at 2 PM</div>
      <div class="act-scene">"The nosebleed started at 2 PM and was still going at 4 PM. He'd had nosebleeds before — everyone had — but they stopped. This one didn't stop. By 5 PM he was in the emergency department with a gauze pack in his nose and a bruise on his arm that had appeared, as far as he could remember, from nothing."</div>
      <div class="act-clinical">28-year-old male · Prolonged epistaxis 3 hours<br>Scattered petechiae · New ecchymoses<br>No recent illness · No anticoagulants</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Diagnosis</div>
      <div class="act-title">Platelets: 4,000</div>
      <div class="act-scene">"The FBC showed platelets of 4,000. The haematologist was called. She looked at the blood film — large platelets, no clumping, adequate red cells, normal white cells. 'This is ITP,' she said. 'His immune system has decided his own platelets are the enemy.' She said it matter-of-factly. The patient heard it as: my body is at war with itself, and it is winning."</div>
      <div class="act-clinical">Platelets: 4,000 · Large platelets on film<br>Blood film: no schistocytes, no clumping<br>ITP diagnosis · Bone marrow megakaryocytes ↑</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act III — The Outcome</div>
      <div class="act-title">The Truce</div>
      <div class="act-scene">"Dexamethasone 40mg daily for 4 days. IVIg. By day 3, the platelets were 45,000. By week 2, they were 180,000. By month 3, they were holding at 140,000 without treatment. 'We call this a sustained complete response,' the haematologist said. 'The immune system backed down.' He looked at the number and thought: truce. Not peace. Truce."</div>
      <div class="act-clinical">Dexamethasone × 4d + IVIg · Platelets → 45,000 by day 3<br>Sustained CR: Plt 140,000 at 3 months · off treatment<br>Monitoring: monthly FBC × 6 months</div>
    </div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">D — The Ghost Doctor</div>
  <h2 class="sec-title">CLINICALLINC<br><em>counts every cell.</em></h2>
  <div class="ghost-block">
    <div class="ghost-header">👻 CLINICALLINC · Hematology Accuracy Specifications</div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Red cell lifespan is approximately 120 days. The spleen removes senescent red cells. Hemolytic anemias accelerate this — the lifespan in severe hemolytic states can be reduced to days.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> ITP (immune thrombocytopenic purpura) is a diagnosis of exclusion. The prose never presents it as the first diagnosis — appropriate exclusion of TTP, HUS, drug-induced thrombocytopenia, and bone marrow pathology is required.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> AML blast percentage threshold for diagnosis is ≥20% blasts in peripheral blood or bone marrow (WHO 2022 criteria). The 70% blasts figure in the prose exceeds diagnostic threshold and requires no qualification.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Coagulation factor activities are measured in % of normal, not absolute units in clinical practice. PT/INR tests the extrinsic + common pathway. APTT tests the intrinsic + common pathway.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Hemoglobin structure: HbA (alpha2-beta2) in adults. HbF (alpha2-gamma2) in fetus/neonate. Sickle cell disease: HbS (glutamine → valine substitution at position 6 of beta chain). These molecular facts are never altered for narrative effect.</span></div>
  </div>
</section>

<hr class="rule">

<section class="fade">
  <div class="sec-label">E — The Interface</div>
  <h2 class="sec-title">The Alchemy<br><em>Studio.</em></h2>
  <div class="iface-grid">
    <div class="iface-card"><div class="iface-icon">🔴</div><div class="iface-title">Blood Film Narrator</div><div class="iface-desc">A blood film is worth a thousand FBC results. The engine translates morphological findings — <em>schistocytes, target cells, Howell-Jolly bodies, hypersegmented neutrophils</em> — into prose that describes what each cell is saying about the disease.</div></div>
    <div class="iface-card"><div class="iface-icon">🌊</div><div class="iface-title">River Metaphor Engine</div><div class="iface-desc">Every hematological condition mapped to a river metaphor: <em>aplastic anemia</em> as a river whose source has dried; <em>polycythemia</em> as a river flooding its banks; <em>thrombosis</em> as a dam built in the wrong place. The metaphor is diagnostic. The diagnosis is literary.</div></div>
    <div class="iface-card"><div class="iface-icon">🧬</div><div class="iface-title">Hemoglobin Biography</div><div class="iface-desc">From the first HbF in fetal circulation to the switch to HbA at birth, to the sickling crisis of HbS in the adult with sickle cell disease — the hemoglobin molecule as a character with a genetic inheritance, a medical history, and a vulnerable future.</div></div>
    <div class="iface-card"><div class="iface-icon">⚔️</div><div class="iface-title">Coagulation Drama Module</div><div class="iface-desc">The coagulation cascade as military operation. Each factor a unit, each reaction a deployment, each inhibitor a strategic withdrawal. <em>Warfarin as a sanctioned embargo on vitamin K-dependent factors. Heparin as an accelerated peacekeeping mission for antithrombin III.</em></div></div>
    <div class="iface-card"><div class="iface-icon">🏥</div><div class="iface-title">Transplant Narrative Engine</div><div class="iface-desc">Bone marrow transplant — the most intimate medical procedure, in which one person's stem cells become another person's blood — told as <em>the most profound act of biological generosity</em> in medicine, with all its risks, rejections, and remissions.</div></div>
    <div class="iface-card"><div class="iface-icon">🌐</div><div class="iface-title">Arabic Blood Poetry</div><div class="iface-desc">Arabic literary tradition is rich with blood as metaphor — <em>dam, dima, the blood of the martyrs</em> — providing a deep cultural register for hematology prose that is native to the language and its literary history.</div></div>
  </div>
</section>

<section class="fade">
  <div class="sec-label">G — The Library</div>
  <h2 class="sec-title">Three novels.<br><em>The river speaks.</em></h2>
  <div class="lib-grid">
    <div class="novel-card">
      <div class="novel-n">01</div>
      <div>
        <div class="novel-en">One Hundred and Twenty Days</div>
        <div class="novel-ar" lang="ar">مئة وعشرون يوماً</div>
        <div class="novel-p">A novel narrated entirely by a single red blood cell — from its formation in the bone marrow, through its 120-day circuit of the body, to its recognition and destruction by the spleen. Each chapter is a day. Each location it visits is a world: the lung capillaries, the coronary arteries, the brain, the kidney, the placenta of a pregnant woman whose blood it briefly enters. A life in 120 days. An entire universe inside a human body.</div>
        <div class="novel-tags"><span class="novel-tag">First-Person RBC</span><span class="novel-tag">Picaresque</span><span class="novel-tag">Temp 0.80</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">02</div>
      <div>
        <div class="novel-en">The River Taken Over</div>
        <div class="novel-ar" lang="ar">النهر المستولى عليه</div>
        <div class="novel-p">A physician with AML — narrating her own diagnosis, her own chemotherapy induction, her own bone marrow transplant from her brother. The clinical precision of a doctor who knows exactly what is happening to her blood, and the devastating intimacy of experiencing it as a patient. Two perspectives in one body: the physician who reads the FBC and the patient who is the FBC.</div>
        <div class="novel-tags"><span class="novel-tag">AML · BMT</span><span class="novel-tag">Dual Perspective</span><span class="novel-tag">Temp 0.85</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">03</div>
      <div>
        <div class="novel-en">The Sickle and the Crescent</div>
        <div class="novel-ar" lang="ar">المنجل والهلال</div>
        <div class="novel-p">A multigenerational story of a family with sickle cell disease — from the grandmother who carried the trait without knowing it, through the father who has the disease and has learned to read the warning signs of a crisis, to the daughter who has inherited HbSS and is deciding whether to pursue gene therapy. The genetics, the pain crises, the hydroxyurea, the hope of curative gene editing — told as a family epic across three generations.</div>
        <div class="novel-tags"><span class="novel-tag">Sickle Cell Disease</span><span class="novel-tag">Multigenerational</span><span class="novel-tag">Temp 0.75</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
  </div>
</section>
