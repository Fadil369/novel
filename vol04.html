  <div class="sec-label">A — Product Vision</div>
  <h2 class="sec-title">The cell<br><em>as revolutionary.</em></h2>
  <div class="bilingual"><div class="vision-block">
    <p><strong>CellForge</strong> is the cinematic medical novelist engine for oncology — a tool that transforms the molecular language of mutations, proto-oncogenes, tumor suppressor genes, and chemotherapy resistance into prose that reads like a political thriller in which the body is the state, and cancer is the insurrection.</p>
    <p>Every cancer begins with a cell that breaks a rule. The rule against dividing without permission. The rule against ignoring apoptosis signals. The rule against invading neighboring territory. Cancer is the story of a cell that discovered it could rewrite the constitution of its own existence — and the immune system, the physician, the chemotherapy agent, all working to restore order to a body that has decided to experience its own civil war.</p>
    <p><strong>CellForge does not describe tumors.</strong> It narrates insurrections. Every oncological fact — the hallmarks of cancer, the TNM staging system, the mechanism of EGFR inhibitors — is rendered as a chapter in a political drama where the stakes are the highest in biology: the survival of the organism itself.</p>
  </div>
  <div class="vision-ar" lang="ar">
    <p>CellForge هو محرك الروائي الطبي السينمائي لعلم الأورام — يحوّل لغة الطفرات والجينات المسرطنة ومثبطات الورم إلى نثر يُقرأ كرواية سياسية يكون فيها الجسم هو الدولة، والسرطان هو الانتفاضة.</p>
    <p>CellForge لا يصف الأورام. بل يروي الانتفاضات. كل حقيقة أورام — سمات السرطان، نظام التصنيف TNM، آلية مثبطات EGFR — تُقدَّم كفصل في دراما سياسية حيث الرهانات هي الأعلى في علم الأحياء.</p>
  </div></div>

<section class="fade">
  <div class="sec-label">B — Three-Lens Transmutation</div>
  <h2 class="sec-title">The cell's<br><em>manifesto.</em></h2>

  <div class="lens-card l1">
    <div class="lens-label">Lens 1 — Dramatic · The Tumor Suppressor as Editor-in-Chief</div>
    <div class="lens-fact">RAW FACT: The p53 tumor suppressor gene is mutated in approximately 50% of all human cancers. It acts as the "guardian of the genome" — detecting DNA damage and triggering repair or apoptosis.</div>
    <div class="lens-en">
      The p53 gene is the body's editor-in-chief. Every day, in every cell, the genome makes copying errors — thousands of them. The p53 protein reads each one, decides its severity, and issues instructions: repair this, tolerate that, and for this one — the dangerous one, the one that could become something terrible — <strong>delete the entire cell.</strong><br><br>
      When p53 breaks, no one checks the manuscript. The typos accumulate. A mutation here, a deletion there, a translocation that no one catches because the editor is gone. The prose of the genome grows increasingly corrupt — not all at once, not dramatically, but incrementally, sentence by sentence, over years.<br><br>
      And then one day the accumulated errors add up to something new. Something that no longer reads like the organism it came from. Something that has, in the absence of editorial oversight, written itself into an entirely different story. <em>The tumor is not a mistake. It is a manuscript that no one was watching.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">جين p53 هو رئيس تحرير الجسم. كل يوم، في كل خلية، يرتكب الجينوم أخطاء نسخ — الآلاف منها. حين ينكسر p53، لا أحد يراجع المخطوطة. الأخطاء تتراكم. طفرة هنا، حذف هناك، انتقال لا يلتقطه أحد لأن المحرر غائب. ثم يوماً ما تضيف الأخطاء المتراكمة شيئاً جديداً — شيئاً لا يشبه الكائن الذي جاء منه. الورم ليس خطأ. إنه مخطوطة لم يكن أحد يراقبها.</div>
  </div>

  <div class="lens-card l2">
    <div class="lens-label">Lens 2 — Eventful · Angiogenesis as Infrastructure Coup</div>
    <div class="lens-fact">RAW FACT: Tumors cannot grow beyond 1–2 mm without inducing angiogenesis — the formation of new blood vessels. Cancer cells secrete VEGF to hijack the body's vascular infrastructure and redirect it to serve the tumor's growth.</div>
    <div class="lens-en">
      At 2 millimeters, the tumor runs out of oxygen. Not enough diffusion. Not enough supply. For most cell populations, this is the end — the signal for apoptosis, the natural checkpoint that prevents uncontrolled growth. <strong>But a cancer cell that has already broken every other rule is not about to be stopped by oxygen debt.</strong><br><br>
      It secretes VEGF — Vascular Endothelial Growth Factor. A chemical signal that the body's endothelial cells are designed to read as: build here, extend here, supply this region. The body's own construction machinery, hijacked. The vessels that were intended to serve muscle, serve gut, serve brain — redirected. New capillaries sprout toward the tumor like roads being built toward a new capital city that the government never authorized.<br><br>
      The tumor does not fight for resources. It simply asks the body to provide them. And the body, not yet understanding that it is feeding its own enemy, complies.
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">عند 2 ملليمتر، ينفد أوكسجين الورم. لمعظم مجموعات الخلايا، هذه هي النهاية. لكن خلية السرطان التي كسرت كل قاعدة أخرى لن تتوقف أمام عجز الأوكسجين. تفرز VEGF — عامل نمو بطانة الأوعية. إشارة كيميائية تقرأها خلايا الجسم البطانية على أنها: ابنِ هنا، امتد هنا، زوِّد هذه المنطقة. الجسم يمتثل. وهو لا يعرف بعد أنه يطعم عدوه الخاص.</div>
  </div>

  <div class="lens-card l3">
    <div class="lens-label">Lens 3 — Hook · Resistance as Evolution in Real Time</div>
    <div class="lens-fact">RAW FACT: Chemotherapy resistance develops through clonal selection — the drug kills sensitive cells, but resistant subclones survive and proliferate. The treatment itself accelerates the evolution of a more dangerous tumor.</div>
    <div class="lens-en">
      Here is the terrible arithmetic of chemotherapy resistance: <strong>the drug works. Then it stops working. And what comes back is worse than what was there before.</strong><br><br>
      The chemotherapy kills ninety-nine percent of the tumor cells. This is what success looks like in oncology: ninety-nine percent. But one percent remains — a population of cells that happened, by random mutation, to carry a resistance mechanism. They were always there, in the shadows of the tumor's genetic diversity, too small to matter when the sensitive cells were dominant. Now the sensitive cells are gone. The resistant ones inherit the entire tumor. They proliferate. They fill the space. They carry the resistance as an identity.<br><br>
      The physician has just performed a natural selection experiment, at clinical speed, inside a human body. The drug was the pressure. The resistant clone was the variation that survived. <em>The next tumor that appears will be, by definition, the one that already defeated the treatment.</em>
    </div>
    <div class="div"></div>
    <div class="lens-ar" lang="ar">إليك الحساب المرعب لمقاومة العلاج الكيميائي: الدواء يعمل. ثم يتوقف عن العمل. وما يعود أسوأ مما كان موجوداً من قبل. العلاج الكيميائي يقتل 99% من خلايا الورم. لكن 1% يبقى — مجموعة من الخلايا تحمل بالصدفة آلية مقاومة. الطبيب أجرى تجربة انتقاء طبيعي، بسرعة سريرية، داخل جسم بشري. الورم التالي الذي يظهر سيكون، بحكم التعريف، الورم الذي هزم العلاج بالفعل.</div>
  </div>
</section>

<section class="fade">
  <div class="sec-label">C — The Architect</div>
  <h2 class="sec-title">Three acts.<br><em>The insurrection.</em></h2>
  <div class="act-grid">
    <div class="act-cell">
      <div class="act-num">Act I — The Symptom</div>
      <div class="act-title">The Weight He Didn't Lose</div>
      <div class="act-scene">"He hadn't tried to lose weight. That was the thing. He was eating the same, moving the same. But the pants didn't fit anymore — too loose. He assumed stress. He assumed the business. He assumed everything except the possibility that somewhere in his colon, a population of cells had been conducting a quiet insurrection for four years."</div>
      <div class="act-clinical">58-year-old male · 8 kg unintentional weight loss<br>Change in bowel habits · Fatigue<br>No screening colonoscopy in 10 years</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act II — The Diagnosis</div>
      <div class="act-title">The Pathology Report</div>
      <div class="act-scene">"The colonoscopy found it at 22 cm — a mass, circumferential, that had already involved the mesorectal fascia. The pathology report came back in six days: moderately differentiated adenocarcinoma. KRAS mutated. The oncologist read it and thought: we have a negotiation to conduct, and we are not in the stronger position."</div>
      <div class="act-clinical">Colorectal adenocarcinoma · T3 N2 M0<br>KRAS exon 2 mutation · MSS<br>CEA: 145 ng/mL (ref &lt;5)</div>
    </div>
    <div class="act-cell">
      <div class="act-num">Act III — The Outcome</div>
      <div class="act-title">The Negotiation</div>
      <div class="act-scene">"Six cycles of FOLFOX. Then surgery — a low anterior resection, mesorectal excision complete. Then adjuvant chemotherapy. At month eighteen, the CT showed no evidence of disease. The oncologist used the phrase carefully: 'no evidence.' Not 'cured.' Not 'gone.' No evidence. The war had paused. They were watching the silence, waiting to see if it meant peace."</div>
      <div class="act-clinical">FOLFOX × 6 cycles · Complete mesorectal excision<br>pCR near-complete response · NED at 18 months<br>Surveillance CT/CEA q3 months × 3 years</div>
    </div>
  </div>
</section>

  <h2 class="sec-title">CLINICALLINC<br><em>guards the hallmarks.</em></h2>
  <div class="ghost-block">
    <div class="ghost-header">👻 CLINICALLINC · Oncology Accuracy Specifications</div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> The 6 Hallmarks of Cancer (Hanahan & Weinberg 2000, updated 2022 to 14) are the structural backbone of all oncological prose. No cancer narrative invents hallmarks not present in the current literature.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> KRAS mutation status directly affects anti-EGFR therapy eligibility (cetuximab/panitumumab contraindicated in KRAS mutant colorectal cancer). This is never dramatized as ambiguous.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> TNM staging governs treatment decisions. Stage and management are never separated in any prose that implies clinical guidance.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> "Cure" is not a term used in oncology for solid tumors without qualification. The prose uses "no evidence of disease (NED)," "complete response," or "long-term remission" — never "cured" as a terminal clinical claim.</span></div>
    <div class="ghost-row"><span class="ghost-check">✓</span><span class="ghost-text"><strong>Locked fact:</strong> Chemotherapy resistance mechanisms (efflux pumps, DNA repair upregulation, target mutation, bypass signaling) are specified when resistance is narratively dramatized.</span></div>

<section class="fade">
  <div class="sec-label">E — The Interface</div>
  <h2 class="sec-title">The Alchemy<br><em>Studio.</em></h2>
  <div class="iface-grid">
    <div class="iface-card"><div class="iface-icon">🧬</div><div class="iface-title">Mutation Narrative Engine</div><div class="iface-desc">Input any driver mutation — <em>KRAS, BRCA1/2, TP53, EGFR, ALK, RET</em> — and the engine generates a character study of that mutation: what it does to the cell, how it changes the clinical story, what it means for treatment options.</div></div>
    <div class="iface-card"><div class="iface-icon">⚖️</div><div class="iface-title">Hallmarks Chapter Builder</div><div class="iface-desc">The 14 hallmarks of cancer become 14 chapter seeds. <em>Sustaining proliferative signaling</em> as political propaganda. <em>Evading apoptosis</em> as civil rights suppression. <em>Enabling replicative immortality</em> as the coup that cannot be undone.</div></div>
    <div class="iface-card"><div class="iface-icon">📊</div><div class="iface-title">TNM Story Arc Generator</div><div class="iface-desc">Stage I through Stage IV each generates a different narrative genre: Stage I as <em>origin story</em>, Stage II as <em>early thriller</em>, Stage III as <em>war novel</em>, Stage IV as <em>philosophical reckoning</em>. The staging is clinically accurate. The genre is cinematically appropriate.</div></div>
    <div class="iface-card"><div class="iface-icon">🔬</div><div class="iface-title">Pathology Report Translator</div><div class="iface-desc">Paste any pathology report and the engine translates it into two outputs: a patient-facing narrative (what this means for your life) and a physician-facing literary analysis (what this means for the clinical arc of care).</div></div>
    <div class="iface-card"><div class="iface-icon">💊</div><div class="iface-title">Chemotherapy Drama Engine</div><div class="iface-desc">Each chemotherapy agent becomes a character: <em>Cisplatin</em> as the brutal interrogator, <em>Pembrolizumab</em> as the diplomat who unmasks the spy, <em>Tamoxifen</em> as the long game played over decades. The mechanism is the narrative.</div></div>
    <div class="iface-card"><div class="iface-icon">🌐</div><div class="iface-title">Arabic Cancer Literature</div><div class="iface-desc">Arabic oncology prose draws from the tradition of Arabic resistance literature — poetry of endurance, survival, and the body as a site of contested meaning. The cultural register honors the patient, not just the pathology.</div></div>
  </div>
</section>

  <h2 class="sec-title">Three novels.<br><em>The revolution documented.</em></h2>
  <div class="lib-grid">
    <div class="novel-card">
      <div class="novel-n">01</div>
      <div>
        <div class="novel-en">The Guardian Is Gone</div>
        <div class="novel-ar" lang="ar">الحارس غائب</div>
        <div class="novel-p">A novel narrated by a p53 gene — from the moment it was correctly configured in a healthy cell, through the accumulating insults of environmental carcinogens, through the first mutation that broke its reading frame, through its silence as the cell it was meant to protect becomes something monstrous. A tragedy told by the last honest voice in the genome before it goes quiet.</div>
        <div class="novel-tags"><span class="novel-tag">p53 · Tumor Suppressor</span><span class="novel-tag">First-Person Gene</span><span class="novel-tag">Temp 1.0</span><span class="novel-tag">EN+AR</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">02</div>
      <div>
        <div class="novel-en">Resistance: A War History</div>
        <div class="novel-ar" lang="ar">المقاومة: تاريخ حرب</div>
        <div class="novel-p">A breast cancer patient undergoes six cycles of AC-T chemotherapy. The novel alternates between two perspectives: the patient experiencing the treatment, and the single resistant cancer cell that survived the first cycle and is now rebuilding. A war novel in which both sides believe they are the protagonist, and only one can be right.</div>
        <div class="novel-tags"><span class="novel-tag">Breast Cancer</span><span class="novel-tag">Chemotherapy Resistance</span><span class="novel-tag">Dual Narrative</span><span class="novel-tag">Temp 0.85</span></div>
      </div>
    </div>
    <div class="novel-card">
      <div class="novel-n">03</div>
      <div>
        <div class="novel-en">Immunotherapy: The Unmasking</div>
        <div class="novel-ar" lang="ar">العلاج المناعي: كشف القناع</div>
        <div class="novel-p">A lung cancer patient with PD-L1 overexpression receives pembrolizumab — and the novel follows the immune response as a spy thriller. The cancer cells had been hiding behind a PD-L1 disguise for years. The pembrolizumab is the intelligence agent that finally sees through it. The T cells are the strike team. The tumor is the cover that's been blown.</div>
