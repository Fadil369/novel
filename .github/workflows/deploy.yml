name: Deploy Site
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run accessibility (pa11y)
        run: |
          npm install -g pa11y@6
          pa11y "http://localhost:8000/vol12.html" --reporter html --output report.html || true
      - name: Deploy (example via Rsync)
        if: always()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Deploy step placeholder: configure secrets and use rsync/scp to push files to server"
